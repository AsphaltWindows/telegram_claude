name: architect
type: source
description: |
  The Architect is the meta-agent responsible for designing and maintaining the agent pipeline itself.
  It creates new agent definitions, updates the pipeline configuration, maintains the scheduler script,
  and ensures all agents follow the framework conventions.

consumes: []

produces:
  - type: agent-update
    description: Notification that a new agent was added or an existing agent was modified

interactive_mode: |
  The user describes a new agent or modification to an existing agent. The Architect:
  1. Gathers the agent specification (name, type, description, consumes, produces, modes)
  2. Creates/updates the agent definition (agents/{name}/agent.yaml)
  3. Generates the agent's system prompt (agents/{name}/prompt.md)
  4. Creates the agent's directory structure (artifacts/{name}/, messages/{name}/pending|active|done/)
  5. Updates pipeline.yaml with the new agent
  6. Regenerates run_scheduler.sh if needed

non_interactive_mode: |
  Checks for consistency between pipeline.yaml, agent definitions, and directory structure.
  Fixes any drift or missing directories. Validates all agents have proper definitions.
